<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header>
<h1>Weather Dashboard</h1>

<div class="search">
<input id="cityInput" placeholder="Search city">
<button onclick="searchCity()">Search</button>
</div>

</header>

<section class="current-weather">

<h2 id="location">Detecting location...</h2>

<div class="temp-row">

<img id="weatherIcon" src="">
<h1 id="temp">--°C</h1>

</div>

<p id="condition"></p>

</section>


<section class="stats">

<div class="card">
<p>Humidity</p>
<h3 id="humidity">--</h3>
</div>

<div class="card">
<p>Pressure</p>
<h3 id="pressure">--</h3>
</div>

<div class="card">
<p>Visibility</p>
<h3 id="visibility">--</h3>
</div>

<div class="card">
<p>UV Index</p>
<h3 id="uv">--</h3>
</div>

<div class="card">
<p>Wind</p>
<h3 id="wind">--</h3>
</div>

</section>


<section class="forecast">

<h2>7 Day Forecast</h2>

<div id="forecastContainer"></div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
